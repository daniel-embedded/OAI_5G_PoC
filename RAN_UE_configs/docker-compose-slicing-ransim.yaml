services:
  ueransim:
    container_name: ueransim
    image: ueransim:latest
    privileged: true
    volumes:
      - ./ran-conf/gnb.yaml:/etc/ueransim/custom-gnb.yaml
#    command: nr-gnb -c /etc/ueransim/gnb.yaml
    environment:
      # GNB Config Parameters
      - MCC=208
      - MNC=95
      - NCI=0x000000010
      - TAC=0xa000
      - LINK_IP=192.168.70.152
      - NGAP_IP=192.168.70.152
      - GTP_IP=192.168.70.152
      - NGAP_PEER_IP=192.168.70.138
      - SST_0=222
      - SD_0=000001
      - SST_1=1
      - SD_1=000001
      - SST_2=2
      - SD_2=000002
      - SST_3=3
      - SD_3=000003
      - IGNORE_STREAM_IDS=true
      # UE Config Parameters
      - NUMBER_OF_UE=8
      - IMSI=208950000000031
      - KEY=0C0A34601D4F07677303652C0462535B
      - OP=63bfa50ee6523365ff14c1f45f88737d
      - OP_TYPE=OPC
      - AMF_VALUE=8000
      - IMEI=356938035643803
      - IMEI_SV=0035609204079514
      - GNB_IP_ADDRESS=192.168.70.152
      - PDU_TYPE=IPv4
      - APN=gatekeeper
      - SST_R=222
      - SD_R=000001
      - SST_C=222
      - SD_C=000001
      - SST_D=222
      - SD_D=000001
    networks:
      public_net:
        ipv4_address: 192.168.70.152
    healthcheck:
      test: /bin/bash -c "ifconfig uesimtun0"
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public_net:
    name: demo-oai-public-net
    external: true
  public_net_access:
    name: oai-public-access
    external: true
